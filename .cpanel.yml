deployment:
  tasks:
    - echo "Activating Node.js environment..."
    - source /home/vibecekf/nodevenv/repositories/vibemotion/22/bin/activate

    - echo "------- vibemotion.co.uk (root app) ----------"
    - echo "Installing dependencies for vibemotion..."
    - cd /home/vibecekf/repositories/vibemotion && npm install --include=dev

    - echo "Building vibemotion..."
    - cd /home/vibecekf/repositories/vibemotion && npm run build

    - echo "Deploying vibemotion to public_html..."
    - export DEPLOYPATH=/home/vibecekf/public_html
    - /bin/rm -rf $DEPLOYPATH/*
    - /bin/cp -r /home/vibecekf/repositories/vibemotion/dist/* $DEPLOYPATH

    - echo "------- vibemotion.co.uk/minditgames ----------"
    - echo "Installing dependencies for minditgames..."
    - cd /home/vibecekf/repositories/vibemotion/minditgames && npm install --include=dev --production=false

    - echo "Building minditgames..."
    - cd /home/vibecekf/repositories/vibemotion/minditgames && npm run build

    - echo "Deploying minditgames..."
    - mkdir -p /home/vibecekf/public_html/minditgames
    - /bin/cp -r /home/vibecekf/repositories/vibemotion/minditgames/dist/* /home/vibecekf/public_html/minditgames

    - echo "✅ Deployment complete."
